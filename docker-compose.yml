services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      OUTPUTS_DIR: /app/outputs
    volumes:
      - outputs_data:/app/outputs
    networks:
      - 1panel-network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      OUTPUTS_DIR: /app/outputs
    volumes:
      - outputs_data:/app/outputs
    networks:
      - 1panel-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
    networks:
      - 1panel-network

volumes:
  outputs_data:

networks:
  1panel-network:
    external: true
    name: 1panel-network
